services:
  - type: web
    name: aprova-mais
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node api/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edutrain-db
          property: connectionString

databases:
  - name: edutrain-db
    plan: free
