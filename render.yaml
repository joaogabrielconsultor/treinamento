services:
  - type: web
    name: aprova-mais
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node api/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: aprova-mais-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: aprova-mais-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: aprova-mais-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: aprova-mais-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: aprova-mais-db
          property: password

databases:
  - name: aprova-mais-db
    plan: free
