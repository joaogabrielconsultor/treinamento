services:
  - type: web
    name: edutrain
    env: node
    plan: free
    buildCommand: npm install && npm run build && cd api && npm install
    startCommand: node api/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: edutrain-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: edutrain-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: edutrain-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: edutrain-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: edutrain-db
          property: password

databases:
  - name: edutrain-db
    plan: free
